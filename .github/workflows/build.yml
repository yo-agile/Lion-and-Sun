name: Build and Release 🦁☀️

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tunnel-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Tunnel Core for Windows
        run: |
          cd tunnel-core/ConsoleClient
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o bin/windows/x86_64/psiphon-tunnel-core.exe .

      - name: Upload Tunnel Core
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-core
          path: tunnel-core/ConsoleClient/bin/windows/x86_64/psiphon-tunnel-core.exe

  build-electron:
    runs-on: windows-latest
    needs: build-tunnel-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Tunnel Core
        uses: actions/download-artifact@v4
        with:
          name: tunnel-core
          path: bin/tunnel-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build

      - name: Upload Electron App
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: dist/*.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-tunnel-core, build-electron]
    steps:
      - name: Download Tunnel Core
        uses: actions/download-artifact@v4
        with:
          name: tunnel-core
          path: .

      - name: Download Electron App
        uses: actions/download-artifact@v4
        with:
          name: electron-app
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.exe
            **/*.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}