name: Build and Release 🦁☀️

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Tunnel Core
        shell: bash
        run: |
          cd tunnel-core/ConsoleClient
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o bin/windows/x86_64/psiphon-tunnel-core.exe .
          mkdir -p ../../bin/tunnel-core
          cp bin/windows/x86_64/psiphon-tunnel-core.exe ../../bin/tunnel-core/

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            dist/*.exe
            bin/tunnel-core/*.exe

  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: .

      - name: Create Release
        run: |
          # Get tag name from ref
          TAG="${GITHUB_REF#refs/tags/}"
          
          # Create release via API
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"Lion and Sun $TAG\",\"draft\":false,\"prerelease\":false}" \
            | grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
          
          echo "Created release ID: $RELEASE_ID"
          
          # Upload exe files
          for f in $(find . -name "*.exe" -type f); do
            echo "Uploading $f..."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$(basename $f)" \
              --data-binary "@$f"
          done
          
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"